<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Homework | Paramount School</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --forest: #006633; --gold: #ffd700; --light: #f4f7f6; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 50px; overflow-x: hidden; }

        /* UNIFIED SIDE-BY-SIDE HEADER */
        header { background: var(--forest); color: white; padding: 20px 3%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 12px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .header-logo { height: 60px; width: auto; flex-shrink: 0; }
        .school-text { display: flex; flex-direction: column; line-height: 1.1; white-space: nowrap; text-align: left; }
        .school-name-main { font-family: 'Montserrat'; font-size: clamp(1rem, 3.5vw, 2.2rem); font-weight: 800; }
        .school-name-sub { font-family: 'Montserrat'; font-size: clamp(0.5rem, 2vw, 0.9rem); color: var(--gold); font-weight: 700; text-transform: uppercase; }
        .portal-label { font-family: 'Montserrat'; font-size: clamp(1rem, 3.5vw, 2.2rem); font-weight: 800; border-left: 3px solid var(--gold); padding-left: 15px; margin-left: 15px; text-transform: uppercase; }

        .container { max-width: 850px; margin: 20px auto; padding: 0 15px; }

        /* RETURN BUTTON */
        .nav-bar { width: 100%; display: flex; justify-content: center; margin-bottom: 20px; }
        .btn-return { background: #e8f5e9; color: var(--forest); border: 2px solid var(--forest); padding: 10px 25px; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 13px; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-return:hover { background: var(--forest); color: white; transform: translateY(-2px); }

        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 6px solid var(--forest); }
        .search-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; font-size: 15px; outline: none; }

        .btn-view { background: linear-gradient(135deg, var(--forest), #004d26); color: white; border: none; padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.3s; }
        
        /* HOMEWORK DISPLAY */
        .subject-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #fafafa; border-radius: 10px; margin-top: 10px; border-left: 5px solid var(--forest); }
        .subject-row p { margin: 5px 0 0; color: #444; font-size: 14px; }
        .sign-area { text-align: center; min-width: 80px; }
        .parent-checkbox { width: 25px; height: 25px; cursor: pointer; accent-color: var(--forest); }

        @media (max-width: 480px) { .header-content { gap: 8px; } .portal-label { padding-left: 10px; margin-left: 10px; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<header>
    <div class="header-content">
        <img src="logo.png" class="header-logo" onerror="this.src='https://via.placeholder.com/50'">
        <div class="school-text">
            <span class="school-name-main">PARAMOUNT</span>
            <span class="school-name-sub">ENGLISH MEDIUM SCHOOL</span>
        </div>
        <h1 class="portal-label">Homework</h1>
    </div>
</header>

<div class="container">
    <div class="nav-bar">
        <a href="index.html" class="btn-return"><i class="fas fa-arrow-left"></i> Return back</a>
    </div>

    <div class="card">
        <h3><i class="fas fa-book-reader"></i> Student Diary</h3>
        <div class="search-grid">
            <div><label>Roll Number</label><input type="text" id="stRoll" placeholder="e.g. 1472070"></div>
            <div><label>Select Date</label><input type="date" id="stDate"></div>
        </div>
        <button class="btn-view" onclick="getDiary()">View Homework</button>
    </div>

    <div id="hwList"></div>
</div>

    };

    function getDiary() {
        const roll = document.getElementById('stRoll').value.trim();
        const date = document.getElementById('stDate').value;
        const list = document.getElementById('hwList');
        const stName = rollToName[roll];

        if(!stName || !date) return Swal.fire('Error', 'Invalid Roll or Date', 'error');

        list.innerHTML = "<p style='text-align:center;'>Loading Diary...</p>";

        db.ref(`homework/${date}`).once('value', (snap) => {
            const data = snap.val();
            if(!data) {
                list.innerHTML = "<div class='card' style='text-align:center; color:red;'>No homework found for this date.</div>";
                return;
            }

            // CHECK EXISTING SIGNATURE STATUS
            db.ref(`homework_status/${date}/${stName}`).once('value', (statusSnap) => {
                const savedStatus = statusSnap.val() || {};
                let html = `<div class="card" style="border-top-color:var(--gold);"><h3>Homework for ${stName}</h3>`;
                
                for(let sub in data) {
                    if(sub === 'lastUpdated') continue;
                    
                    // Determine if already checked
                    const isChecked = (savedStatus[sub] && savedStatus[sub].verified) ? "checked" : "";

                    html += `
                    <div class="subject-row">
                        <div><strong style="color:var(--forest)">${sub}</strong><p>${data[sub]}</p></div>
                        <div class="sign-area">
                            <label style="font-size:10px; display:block;">Parent Sign</label>
                            <input type="checkbox" class="parent-checkbox" ${isChecked} 
                                onchange="signHW('${date}','${stName}','${sub}',this.checked)">
                        </div>
                    </div>`;
                }
                list.innerHTML = html + `</div>`;
            });
        });
    }

    function signHW(date, name, sub, checked) {
        db.ref(`homework_status/${date}/${name}/${sub}`).set({
            verified: checked,
            time: new Date().toLocaleString()
        }).then(() => {
            if(checked) {
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Signature Saved', showConfirmButton: false, timer: 1500 });
            }
        });
    }

    // Set default date to today
    document.getElementById('stDate').valueAsDate = new Date();
</script>
